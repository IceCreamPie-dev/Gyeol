name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NINJA_VERSION: "1.11.1.1"

jobs:
  core:
    name: Core (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Prepare logs
        shell: pwsh
        run: New-Item -ItemType Directory -Path logs -Force | Out-Null

      - name: Configure + Build + Test (Windows)
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release 2>&1 | Tee-Object -FilePath logs/core-configure.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build build 2>&1 | Tee-Object -FilePath logs/core-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ctest --test-dir build --output-on-failure 2>&1 | Tee-Object -FilePath logs/core-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Graph Patch JSON IR E2E (Windows)
        shell: pwsh
        run: |
          @(
            'label start:'
            '    "hello"'
            'label end:'
            '    "end"'
          ) | Set-Content -Path logs/graph_smoke_story.gyeol -Encoding UTF8

          $patch = @'
          {
            "format": "gyeol-graph-patch",
            "version": 2,
            "ops": [
              {
                "op": "insert_instruction",
                "node": "start",
                "index": 0,
                "instruction": {
                  "type": "Line",
                  "text": "intro"
                }
              },
              {
                "op": "update_line_text",
                "instruction_id": "n0:i0",
                "text": "hello-updated"
              }
            ]
          }
          '@
          $patch | Set-Content -Path logs/graph_smoke_patch.json -Encoding UTF8

          $compiler = "build/src/gyeol_compiler/GyeolCompiler.exe"
          & $compiler --validate logs/graph_smoke_story.gyeol
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $compiler --export-json-ir logs/graph_smoke_story.gyeol -o logs/graph_smoke.story.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $compiler --export-graph-json logs/graph_smoke.story.json -o logs/graph_smoke.graph.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $compiler --preview-graph-patch logs/graph_smoke.story.json --patch logs/graph_smoke_patch.json --format json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $compiler --apply-graph-patch logs/graph_smoke.story.json --patch logs/graph_smoke_patch.json -o logs/graph_smoke.patched.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $compiler --validate-json-ir logs/graph_smoke.patched.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Runtime Contract Conformance (Core/Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path logs/conformance -Force | Out-Null

          $cli = ".\build\src\tests\GyeolRuntimeContractCLI.exe"
          $story = "src/tests/conformance/runtime_contract_v1_story.json"
          $actions = "src/tests/conformance/runtime_contract_v1_actions_cross.json"
          $golden = "src/tests/conformance/runtime_contract_v1_golden_core_cross.json"

          & $cli generate --engine core --story $story --actions $actions --output logs/conformance/core.actual.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $cli compare --expected $golden --actual logs/conformance/core.actual.json --expected-engine core --expected-out logs/conformance/core.expected.json --actual-out logs/conformance/core.actual.json --diff-out logs/conformance/core.diff.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Runtime Performance Gate (Core/Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path logs/perf -Force | Out-Null

          $perfCli = ".\build\src\tests\GyeolRuntimePerfCLI.exe"
          $suite = "src/tests/perf/runtime_perf_suite_core.json"
          $baseline = "src/tests/perf/runtime_perf_baseline_core.json"

          & $perfCli run --suite $suite --output logs/perf/core.actual.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $perfCli compare --baseline $baseline --actual logs/perf/core.actual.json --threshold 0.15 --report-out logs/perf/core.compare.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload core logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: core-logs-windows
          path: logs/**
