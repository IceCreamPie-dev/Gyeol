name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate Tag (SemVer)
    runs-on: ubuntu-latest
    steps:
      - name: Check tag format
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release tag '${TAG_NAME}'. Use SemVer format: vMAJOR.MINOR.PATCH (example: v1.2.3)."
            exit 1
          fi
          echo "Tag format is valid: ${TAG_NAME}"

  build:
    needs: validate-tag
    name: Build (windows-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp build/src/gyeol_compiler/GyeolCompiler.exe dist/
          cp build/src/gyeol_lsp/GyeolLSP.exe dist/
          cp build/src/gyeol_debugger/GyeolDebugger.exe dist/
          cp build/src/tests/GyeolRuntimeContractCLI.exe dist/
          cp build/src/tests/GyeolRuntimePerfCLI.exe dist/
          cp LICENSE dist/

      - name: Archive (zip)
        shell: bash
        run: cd dist && 7z a ../gyeol-windows-x64.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gyeol-windows-x64
          path: gyeol-windows-x64.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/gyeol-windows-x64/gyeol-windows-x64.zip
