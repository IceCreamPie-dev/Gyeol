name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'tools/pygments-gyeol/**'
      - 'src/gyeol_core/**'
      - 'src/gyeol_compiler/**'
      - 'schemas/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- MkDocs 문서 빌드 ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs + Material + Gyeol lexer
        run: |
          pip install mkdocs-material
          pip install ./tools/pygments-gyeol

      - name: Check docs policy
        run: python tools/dev/check-docs-policy.py

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
