site_name: Gyeol 문서
site_description: "한번 작성하고 어디서든 실행하는 스토리 엔진"
site_url: https://icecreampie-dev.github.io/Gyeol/
repo_url: https://github.com/IceCreamPie-dev/Gyeol
repo_name: IceCreamPie-dev/Gyeol

theme:
  name: material
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true

nav:
  - 홈: index.md
  - 문서 스타일 가이드: style-guide.md
  - 시작하기:
    - 소개: getting-started/introduction.md
    - 설치: getting-started/installation.md
    - 빠른 시작: getting-started/quick-start.md
    - JSON IR 도구 흐름: getting-started/json-ir-workflow.md
  - API 레퍼런스:
    - Runner (C++): api/class-runner.md
    - Variant: api/class-variant.md
  - 도구:
    - 컴파일러 CLI: tools/compiler.md
    - 디버거: tools/debugger.md
  - 고급:
    - 아키텍처: advanced/architecture.md
    - Runtime Contract v1.1: advanced/runtime-contract.md
    - 저장/로드: advanced/save-load.md
    - 다국어 지원: advanced/localization.md
    - 릴리스 & PR 정책: advanced/release-policy.md
